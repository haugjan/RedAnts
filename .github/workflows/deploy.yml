name: Deploy to Azure

# Deploys the RedAnts Umbraco app to the Azure App Service in resource group RG_RedAnts
# via Kudu ZipDeploy (same approach as the Sporthalle Sulzerallee project).
#
# Required GitHub configuration (Settings -> Secrets and variables -> Actions):
#   Variables:
#     AZURE_WEBAPP_NAME  - name of the App Service in RG_RedAnts (e.g. app-redants)
#   Secrets:
#     KUDU_USER          - App Service deployment (SCM) username, e.g. $app-redants
#     KUDU_PASS          - App Service deployment (SCM) password
#   (Get both from the App Service -> Deployment Center -> FTPS/SCM credentials,
#    or download the publish profile and read userName / userPWD.)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore RedAnts.csproj

      - name: Build
        run: dotnet build RedAnts.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish RedAnts.csproj --configuration Release --output ./publish --no-build

      - name: Package
        run: cd ./publish && zip -r ../app.zip . && cd ..

      - name: Deploy via Kudu ZipDeploy
        env:
          KUDU_USER: ${{ secrets.KUDU_USER }}
          KUDU_PASS: ${{ secrets.KUDU_PASS }}
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -u "$KUDU_USER:$KUDU_PASS" \
            "https://$WEBAPP.scm.azurewebsites.net/api/zipdeploy?async=true" \
            --data-binary @app.zip \
            --max-time 600)
          echo "ZipDeploy HTTP status: $HTTP_STATUS"
          # 202/200 = accepted; 504 = gateway timeout but upload may have succeeded
          if [ "$HTTP_STATUS" != "202" ] && [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "504" ]; then
            echo "Unexpected HTTP status from ZipDeploy: $HTTP_STATUS"
            exit 1
          fi
          if [ "$HTTP_STATUS" = "504" ]; then
            echo "Gateway timeout on upload — polling deployment status to check if it succeeded."
          fi

      - name: Wait for deployment to complete
        env:
          KUDU_USER: ${{ secrets.KUDU_USER }}
          KUDU_PASS: ${{ secrets.KUDU_PASS }}
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          echo "Polling Kudu for deployment status..."
          for i in $(seq 1 40); do
            sleep 15
            RESULT=$(curl -s -u "$KUDU_USER:$KUDU_PASS" \
              "https://$WEBAPP.scm.azurewebsites.net/api/deployments/latest")
            STATUS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))")
            COMPLETE=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('complete',''))")
            echo "Attempt $i: status=$STATUS complete=$COMPLETE"
            if [ "$COMPLETE" = "True" ]; then
              if [ "$STATUS" = "4" ]; then
                echo "Deployment succeeded."
                exit 0
              else
                echo "Deployment finished with non-success status $STATUS."
                exit 1
              fi
            fi
          done
          echo "Deployment did not complete within 10 minutes."
          exit 1

      - name: Warm up the site
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          BASE="https://$WEBAPP.azurewebsites.net"
          # Pages to pre-load so the first real visitor doesn't pay the cold-start cost.
          PAGES="/"

          # Wait for the home page to return 200 (Umbraco fully started after restart).
          # NOTE: on the very first deploy the Azure SQL database is still empty and Umbraco
          # serves its one-time installer instead of the site, so "/" will not return 200 until
          # an admin completes the install at /umbraco. Warm-up is therefore best-effort: it never
          # fails the deploy, it only pre-warms the site once it is actually installed.
          echo "Waiting for the app to respond after restart..."
          READY=0
          for i in $(seq 1 40); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$BASE/")
            echo "Attempt $i: GET / -> $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              READY=1
              break
            fi
            sleep 15
          done
          if [ "$READY" != "1" ]; then
            echo "Site did not return 200 within the warm-up window (expected before the first-run"
            echo "Umbraco install is completed at /umbraco). Treating warm-up as best-effort."
            exit 0
          fi

          # Prime the remaining pages so their views are JIT-compiled and caches filled.
          for PAGE in $PAGES; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$BASE$PAGE")
            echo "Warmed $PAGE -> $HTTP_STATUS"
          done
          echo "Warm-up complete."
