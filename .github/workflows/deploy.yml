name: Deploy to Azure

# Two-stage deploy (both App Services in Switzerland North), Microsoft Entra / OIDC — no basic
# auth and no long-lived publish password.
#
#   push to feature/**  -> deploy DEV
#   push to main        -> deploy DEV, then PROD
#
# GitHub Environments 'dev' and 'prod' each carry the federated-credential subject
# (repo:haugjan/RedAnts:environment:<env>) and the per-stage variable AZURE_WEBAPP_NAME
# (app-redants-dev / app-redants-prod). Repo secrets (same app registration for both):
#   AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID.

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for the runner to request an OIDC token
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: dotnet restore RedAnts.csproj
      - run: dotnet build RedAnts.csproj --configuration Release --no-restore
      - run: dotnet publish RedAnts.csproj --configuration Release --output ./publish --no-build
      - name: Package
        run: cd ./publish && zip -r ../app.zip . && cd ..
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.zip
          retention-days: 3

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    # Serialize all writes to the DEV app across branches (feature/** and main both deploy here).
    # Queue instead of cancel: never interrupt an in-flight `az webapp deploy`, which could leave
    # the App Service with a half-extracted zip. A newer run waits; a still-pending run is replaced.
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy (az webapp deploy over ARM)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          az webapp deploy --resource-group RG_RedAnts --name "$WEBAPP" \
            --src-path app.zip --type zip --track-status false --timeout 600000
      - name: Configure Payrexx (dev — test instance)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
          PAYREXX_TEST_API_SECRET: ${{ secrets.PAYREXX_TEST_API_SECRET }}
        run: |
          if [ -z "$PAYREXX_TEST_API_SECRET" ]; then
            echo "Payrexx test secret (PAYREXX_TEST_API_SECRET) not set; leaving dev Payrexx config unchanged."; exit 0
          fi
          az webapp config appsettings set --resource-group RG_RedAnts --name "$WEBAPP" \
            --settings Payrexx__Instance=redants-test Payrexx__ApiSecret="$PAYREXX_TEST_API_SECRET" \
            --output none
          echo "Payrexx test instance (redants-test) applied to $WEBAPP."
      - name: Configure order-number prefix (dev)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          az webapp config appsettings set --resource-group RG_RedAnts --name "$WEBAPP" \
            --settings Orders__NumberPrefix=DEV- \
            --output none
          echo "Order-number prefix DEV- applied to $WEBAPP."
      - name: Configure Imaging HMAC (dev)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
          IMAGING_HMAC_KEY: ${{ secrets.IMAGING_HMAC_KEY }}
        run: |
          if [ -z "$IMAGING_HMAC_KEY" ]; then
            echo "Imaging HMAC secret not set; skipping."; exit 0
          fi
          az webapp config appsettings set --resource-group RG_RedAnts --name "$WEBAPP" \
            --settings Umbraco__CMS__Imaging__HMACSecretKey="$IMAGING_HMAC_KEY" \
            --output none
          echo "Imaging HMAC applied to $WEBAPP."
      - name: Configure SMTP (dev)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "SMTP secrets not set; skipping."; exit 0
          fi
          az webapp config appsettings set --resource-group RG_RedAnts --name "$WEBAPP" \
            --settings Smtp__User="$SMTP_USER" Smtp__Password="$SMTP_PASSWORD" \
            --output none
          echo "SMTP settings applied to $WEBAPP."
      - name: Warm up the site
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          BASE="https://$WEBAPP.azurewebsites.net"
          # "Up" = 2xx, 3xx or 401: the root redirects to /ticketing/ (3xx) and the site gate
          # answers 401 without credentials - both mean Umbraco booted. Then hit /warmup so the
          # runtime-compiled Razor views are precompiled. Best-effort: never fail the deploy here.
          for i in $(seq 1 40); do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$BASE/" || echo "000")
            echo "Attempt $i: GET / -> $S"
            case "$S" in
              2*|3*|401)
                echo "Up. Warming core pages via /warmup..."
                curl -s --max-time 180 "$BASE/warmup" || echo "(warmup call failed, best-effort)"
                exit 0 ;;
            esac
            sleep 15
          done
          echo "App did not respond within the warm-up window (best-effort)."; exit 0

  deploy-prod:
    needs: [build, deploy-dev]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    # Same queueing as dev: only one PROD deploy writes at a time, and it is never cancelled mid-write.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy (az webapp deploy over ARM)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          az webapp deploy --resource-group RG_RedAnts --name "$WEBAPP" \
            --src-path app.zip --type zip --track-status false --timeout 600000
      - name: Configure Payrexx (prod)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
          PAYREXX_API_SECRET: ${{ secrets.PAYREXX_API_SECRET }}
        run: |
          if [ -z "$PAYREXX_API_SECRET" ]; then
            echo "Payrexx secret not set for prod; skipping."; exit 0
          fi
          az webapp config appsettings set --resource-group RG_RedAnts --name "$WEBAPP" \
            --settings Payrexx__Instance=redants Payrexx__ApiSecret="$PAYREXX_API_SECRET" \
            --output none
          echo "Payrexx settings applied to $WEBAPP."
      - name: Configure Imaging HMAC (prod)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
          IMAGING_HMAC_KEY: ${{ secrets.IMAGING_HMAC_KEY }}
        run: |
          if [ -z "$IMAGING_HMAC_KEY" ]; then
            echo "Imaging HMAC secret not set; skipping."; exit 0
          fi
          az webapp config appsettings set --resource-group RG_RedAnts --name "$WEBAPP" \
            --settings Umbraco__CMS__Imaging__HMACSecretKey="$IMAGING_HMAC_KEY" \
            --output none
          echo "Imaging HMAC applied to $WEBAPP."
      - name: Configure SMTP (prod)
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "SMTP secrets not set; skipping."; exit 0
          fi
          az webapp config appsettings set --resource-group RG_RedAnts --name "$WEBAPP" \
            --settings Smtp__User="$SMTP_USER" Smtp__Password="$SMTP_PASSWORD" \
            --output none
          echo "SMTP settings applied to $WEBAPP."
      - name: Warm up the site
        env:
          WEBAPP: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          BASE="https://$WEBAPP.azurewebsites.net"
          for i in $(seq 1 40); do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$BASE/" || echo "000")
            echo "Attempt $i: GET / -> $S"
            case "$S" in
              2*|3*|401)
                echo "Up. Warming core pages via /warmup..."
                curl -s --max-time 180 "$BASE/warmup" || echo "(warmup call failed, best-effort)"
                exit 0 ;;
            esac
            sleep 15
          done
          echo "App did not respond within the warm-up window (best-effort)."; exit 0
