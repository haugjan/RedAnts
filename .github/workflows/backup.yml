name: Weekly Backup

# Requires:
#   - redants-github-deploy app registration: Contributor role on RG_RedAnts
#     (currently only Website Contributor on the App Service — must be extended once)
#     az role assignment create --assignee <appId> --role Contributor \
#       --scope /subscriptions/<sub>/resourceGroups/RG_RedAnts
#   - Repo secrets: BACKUP_SQL_ADMIN_USER, BACKUP_SQL_ADMIN_PASSWORD

on:
  schedule:
    - cron: '0 2 * * 0'  # Sundays 02:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: prod
    env:
      RESOURCE_GROUP: RG_RedAnts
      SQL_SERVER: sql-redants-ch
      SQL_DATABASE: sqldb-redants-prod
      STORAGE_ACCOUNT: stredantsprod
      BACKUP_CONTAINER: sql-backups

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure blob protection (soft delete 14 d + container soft delete 14 d + versioning + change feed, idempotent)
        run: |
          az storage account blob-service-properties update \
            --account-name "$STORAGE_ACCOUNT" \
            --resource-group "$RESOURCE_GROUP" \
            --enable-delete-retention true \
            --delete-retention-days 14 \
            --enable-container-delete-retention true \
            --container-delete-retention-days 14 \
            --enable-versioning true \
            --enable-change-feed true

      - name: Retrieve storage key
        run: |
          KEY=$(az storage account keys list \
            --resource-group "$RESOURCE_GROUP" \
            --account-name "$STORAGE_ACCOUNT" \
            --query "[0].value" -o tsv)
          echo "::add-mask::$KEY"
          echo "STORAGE_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Ensure sql-backups container exists
        run: |
          az storage container create \
            --name "$BACKUP_CONTAINER" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY"

      - name: Export SQL database as BACPAC
        run: |
          BACKUP_DATE=$(date -u +%Y-%m-%d)
          BACPAC_URI="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${BACKUP_CONTAINER}/redants-${BACKUP_DATE}.bacpac"
          echo "Exporting to $BACPAC_URI ..."
          az sql db export \
            --resource-group "$RESOURCE_GROUP" \
            --server "$SQL_SERVER" \
            --name "$SQL_DATABASE" \
            --admin-user "${{ secrets.BACKUP_SQL_ADMIN_USER }}" \
            --admin-password "${{ secrets.BACKUP_SQL_ADMIN_PASSWORD }}" \
            --storage-key-type StorageAccessKey \
            --storage-key "$STORAGE_KEY" \
            --storage-uri "$BACPAC_URI"
          echo "Export done: redants-${BACKUP_DATE}.bacpac"

      - name: Delete BACPAC files older than 90 days
        run: |
          CUTOFF=$(date -u -d "-90 days" +%Y-%m-%dT%H:%M:%SZ)
          az storage blob list \
            --container-name "$BACKUP_CONTAINER" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" \
            --query "[?properties.lastModified < '${CUTOFF}'].name" \
            -o tsv | \
          while IFS= read -r blob; do
            [ -z "$blob" ] && continue
            echo "Deleting: $blob"
            az storage blob delete \
              --container-name "$BACKUP_CONTAINER" \
              --name "$blob" \
              --account-name "$STORAGE_ACCOUNT" \
              --account-key "$STORAGE_KEY"
          done
